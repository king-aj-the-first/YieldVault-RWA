version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    security-updates: true
    rebase-strategy: auto
    labels:
      - "dependencies"
      - "security"

  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    security-updates: true
    rebase-strategy: auto
    labels:
      - "dependencies"
      - "security"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    security-updates: true
    rebase-strategy: auto
    labels:
      - "dependencies"
      - "security"
